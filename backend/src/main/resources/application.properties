spring.application.name=backend
spring.config.import=optional:file:../.env[.properties],optional:file:../.env.local[.properties]
# ==========================================
# DATABASE CONNECTION CORE SETTINGS
# ==========================================
spring.datasource.url=jdbc:postgresql://localhost:5432/job_tracker
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# OBJECT-RELATIONAL MAPPING (JPA / HIBERNATE)
# ==========================================
# 'update' automatically builds database tables based on our entities on startup
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect